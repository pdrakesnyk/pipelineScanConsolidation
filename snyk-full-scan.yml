##############################################################################
# snyk-full-scan.yml
#
# Runs all four Snyk scan types and groups every project under a SINGLE
# target in the Snyk UI.
#
# Grouping mechanism (varies by scan type — CLI flags differ)
# ────────────────────────────────────────────────────────────
# snyk monitor         → --remote-repo-url sets the target; --project-name
#                        differentiates projects within it
# snyk code test       → --target-name sets the target; --project-name
#                        differentiates projects within it
# snyk container mon.  → target is derived from the image name; --project-name
#                        differentiates projects (no --target-name support)
# snyk iac test        → --target-name sets the target (requires --report);
#                        --project-name differentiates projects within it
#
# Note: --target-name is NOT supported by snyk monitor or snyk container
# monitor. For those commands, use --remote-repo-url to control grouping.
#
# Scan type         CLI command          Appears in Snyk UI as
# ────────────────  ───────────────────  ─────────────────────────────
# Open Source       snyk monitor         Projects → Dependencies
# Code (SAST)       snyk code test       Projects → Code analysis *
# Container         snyk container mon.  Projects → Container
# IaC               snyk iac test        Projects → Infrastructure
#
# * snyk code test --report requires a Snyk Code plan that supports reporting.
#   Without it, results print to stdout only (still useful for CI gates).
#
# Required secrets (Settings → Secrets → Actions):
#   SNYK_TOKEN        – your Snyk service account token
#   DOCKER_IMAGE      – image to scan, e.g. "my-org/my-app:${{ github.sha }}"
#                       (set as a secret or env var; see env block below)
##############################################################################

name: Snyk – Full Scan (all project types)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # ── Snyk grouping ──────────────────────────────────────────────────────────
  # TARGET_NAME is the single target that will appear in the Snyk UI.
  # Using the repo name keeps it stable across branches.
  TARGET_NAME: ${{ github.repository }}

  # ── Container image ────────────────────────────────────────────────────────
  # Override via repository variable/secret if you build the image separately.
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'myorg/myapp:latest' }}

  # ── Snyk CLI version pin (optional but recommended) ────────────────────────
  SNYK_CLI_VERSION: latest   # pin to e.g. "1.1292.1" for reproducibility

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 – Open Source (SCA) via snyk monitor
  # Creates/updates a monitored snapshot in Snyk; visible under the target.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-open-source:
    name: Open Source (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js          # adjust for your runtime (Python, Java, etc.)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies    # required so Snyk can build the dep graph
        run: npm ci                   # swap for: pip install, mvn install, etc.

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # snyk monitor pushes a snapshot; --all-projects handles monorepos.
      # Remove --all-projects for single-manifest repos.
      # Target grouping in the Snyk UI is controlled via --remote-repo-url,
      # not --target-name (which is not supported by this command).
      - name: Snyk Monitor (Open Source)
        run: |
          snyk monitor \
            --all-projects \
            --project-name="[sca] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}" \
            --remote-repo-url="https://github.com/${{ github.repository }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Test gate — runs independently of monitor so a clean snapshot is always
      # pushed even if the gate fails. Set continue-on-error: false to block PRs.
      - name: Snyk Test (Open Source)
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 – Snyk Code (SAST)
  # --report uploads results to Snyk UI; requires a plan that supports it.
  # Without --report, results are printed to stdout for CI gating only.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-code:
    name: Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Report — uploads a snapshot to Snyk UI regardless of findings.
      # --report always continues so the UI always gets a fresh result.
      - name: Snyk Code Report
        run: |
          snyk code test \
            --report \
            --target-name="${{ env.TARGET_NAME }}" \
            --project-name="[code] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Test gate — separate run so the threshold controls the exit code
      # independently of the report upload above.
      # Set continue-on-error: false to hard-block the pipeline.
      - name: Snyk Code Test
        run: |
          snyk code test \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 – Container
  # Scans the image manifest + OS packages; monitor keeps a live snapshot.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-container:
    name: Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image             # skip if image already exists in a registry
        run: docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # monitor → live snapshot in Snyk UI
      # The target in the Snyk UI is derived from the image name.
      # Use --project-name to differentiate this project within the org.
      - name: Snyk Container Monitor
        run: |
          snyk container monitor ${{ env.DOCKER_IMAGE }} \
            --project-name="[container] ${{ env.DOCKER_IMAGE }}" \
            --org="${{ vars.SNYK_ORG_ID }}" \
            --file=Dockerfile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Test gate — runs independently of monitor so a snapshot is always
      # pushed even if the gate fails. Set continue-on-error: false to block PRs.
      - name: Snyk Container Test
        run: |
          snyk container test ${{ env.DOCKER_IMAGE }} \
            --file=Dockerfile \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 – Infrastructure as Code (IaC)
  # snyk iac test supports --report for uploading results to Snyk UI.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-iac:
    name: Infrastructure as Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Report — uploads a snapshot to Snyk UI regardless of findings.
      # Pass a specific path (e.g. "./infra") or use "." to scan the entire repo.
      - name: Snyk IaC Report
        run: |
          snyk iac test . \
            --report \
            --target-name="${{ env.TARGET_NAME }}" \
            --project-name="[iac] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Test gate — separate run so the threshold controls the exit code
      # independently of the report upload above.
      # Set continue-on-error: false to hard-block the pipeline.
      - name: Snyk IaC Test
        run: |
          snyk iac test . \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 – Summary (runs after all scan jobs)
  # Handy for PR status checks — a single gate that reflects all scan results.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-summary:
    name: Snyk Scan Summary
    runs-on: ubuntu-latest
    needs:
      - snyk-open-source
      - snyk-code
      - snyk-container
      - snyk-iac
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║         SNYK SCAN SUMMARY                ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Target   : ${{ env.TARGET_NAME }}"
          echo "║ Open Source : ${{ needs.snyk-open-source.result }}"
          echo "║ Code        : ${{ needs.snyk-code.result }}"
          echo "║ Container   : ${{ needs.snyk-container.result }}"
          echo "║ IaC         : ${{ needs.snyk-iac.result }}"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "View all results in Snyk UI under target: ${{ env.TARGET_NAME }}"

##############################################################################
# Tips for Snyk UI grouping
# ─────────────────────────
# CLI flag support for grouping differs by scan type:
#
#   Command                  --target-name  --project-name  --remote-repo-url
#   ──────────────────────── ─────────────  ──────────────  ─────────────────
#   snyk monitor             ✗ (no)         ✓               ✓ (sets target)
#   snyk code test --report  ✓              ✓               —
#   snyk container monitor   ✗ (no)         ✓               —
#   snyk iac test --report   ✓              ✓               ✓
#
# For snyk monitor and snyk container monitor, use --remote-repo-url to
# influence target grouping. The URL path becomes the target name in the UI.
# Set it to the same GitHub URL across all runs to keep projects together.
#
# For snyk code test and snyk iac test, --target-name directly sets the
# target display name. Using github.repository is recommended.
#
# 1. --project-name differentiates project cards within a target.
#    Convention used here: "[type] <repo>" — easy to filter in the UI.
#
# 2. For monorepos with multiple manifests, snyk monitor --all-projects
#    auto-generates project names. Override with --project-name-prefix
#    instead of --project-name to avoid collisions:
#      --project-name-prefix="[sca]"
#
# 3. snyk code test --report and snyk iac test --report require:
#    - Snyk Code / IaC+ plan
#    - SNYK_ORG_ID set as a GitHub Actions variable (vars.SNYK_ORG_ID)
#      Find it: Snyk UI → Org Settings → General → Organization ID
#
# 4. To use the Snyk GitHub Action instead of the CLI directly, replace
#    individual steps with:
#      uses: snyk/actions/node@master   (or python, maven, docker, iac, etc.)
#    The same flags apply via `args:`.
##############################################################################
