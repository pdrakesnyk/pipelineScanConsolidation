##############################################################################
# snyk-full-scan.yml
#
# Runs all four Snyk scan types and groups every project under a SINGLE
# target in the Snyk UI, following Snyk's recommended 3-stage adoption model.
#
# ── Snyk 3-Stage CI/CD Adoption Model (per Snyk implementation docs) ───────
#
# Stage 1 – Expose vulnerabilities (monitor only, never block builds)
#   Use snyk monitor to gain visibility. Do NOT fail the build yet.
#   Teams need time to understand their vulnerability landscape first.
#
# Stage 2 – Gatekeeper (add snyk test, start failing builds)
#   Once teams have triaged existing issues, add snyk test to block new ones.
#   This is "stopping the bleeding" — preventing net-new vulnerabilities.
#
# Stage 3 – Continuous monitoring (test THEN monitor on success)  ← this file
#   Run snyk test first. Only run snyk monitor if test passes, so that
#   snapshots in the Snyk UI represent known-clean states of your build.
#   This is the pattern implemented below.
#
# ── Grouping mechanism (flags differ by scan type) ──────────────────────────
# snyk monitor         → --remote-repo-url sets the target; --project-name
#                        differentiates projects within it
# snyk code test       → --target-name sets the target; --project-name
#                        differentiates projects within it
# snyk container mon.  → target derived from image name; --project-name
#                        differentiates projects (no --target-name support)
# snyk iac test        → --target-name sets the target (requires --report);
#                        --project-name differentiates projects within it
#
# Note: --target-name is NOT supported by snyk monitor or snyk container
# monitor. Use --remote-repo-url to control target grouping for those.
#
# Scan type         CLI command          Appears in Snyk UI as
# ────────────────  ───────────────────  ─────────────────────────────
# Open Source       snyk monitor         Projects → Dependencies
# Code (SAST)       snyk code test       Projects → Code analysis *
# Container         snyk container mon.  Projects → Container
# IaC               snyk iac test        Projects → Infrastructure
#
# * snyk code test --report requires a Snyk Code plan that supports reporting.
#   Without it, results print to stdout only (still useful for CI gates).
#
# Required secrets (Settings → Secrets → Actions):
#   SNYK_TOKEN          – Snyk service account token
#   SLACK_WEBHOOK_URL   – Incoming webhook URL for scan result notifications
# Required variables (Settings → Variables → Actions):
#   SNYK_ORG_ID         – Snyk org ID (Org Settings → General → Organization ID)
#   DOCKER_IMAGE        – Image to scan, e.g. "my-org/my-app:latest"
##############################################################################

name: Snyk – Full Scan (all project types)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # ── Snyk grouping ──────────────────────────────────────────────────────────
  # TARGET_NAME is the single target that will appear in the Snyk UI.
  # Using the repo name keeps it stable across branches.
  TARGET_NAME: ${{ github.repository }}

  # ── Container image ────────────────────────────────────────────────────────
  # Override via repository variable/secret if you build the image separately.
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'myorg/myapp:latest' }}

  # ── Snyk CLI version pin (optional but recommended) ────────────────────────
  SNYK_CLI_VERSION: latest   # pin to e.g. "1.1292.1" for reproducibility

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 – Open Source (SCA) via snyk monitor
  # Creates/updates a monitored snapshot in Snyk; visible under the target.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-open-source:
    name: Open Source (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js          # adjust for your runtime (Python, Java, etc.)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies    # required so Snyk can build the dep graph
        run: npm ci                   # swap for: pip install, mvn install, etc.

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Stage 2: Test gate — runs first per the 3-stage adoption model.
      # Set continue-on-error: false to hard-block the pipeline on findings.
      - name: Snyk Test (Open Source)
        id: sca-test
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline

      # Stage 3: Monitor — only runs when test passes so the Snyk UI snapshot
      # always represents a known-clean build state.
      # Target grouping is controlled via --remote-repo-url (not --target-name,
      # which is not supported by snyk monitor).
      - name: Snyk Monitor (Open Source)
        if: steps.sca-test.outcome == 'success'
        run: |
          snyk monitor \
            --all-projects \
            --project-name="[sca] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}" \
            --remote-repo-url="https://github.com/${{ github.repository }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 – Snyk Code (SAST)
  # --report uploads results to Snyk UI; requires a plan that supports it.
  # Without --report, results are printed to stdout for CI gating only.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-code:
    name: Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Stage 2: Test gate — runs first per the 3-stage adoption model.
      # Set continue-on-error: false to hard-block the pipeline on findings.
      - name: Snyk Code Test
        id: code-test
        run: |
          snyk code test \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline

      # Stage 3: Report — uploads snapshot to Snyk UI only when test passes,
      # so the UI reflects known-clean build states.
      # --report requires a Snyk Code plan; without it, omit this step.
      - name: Snyk Code Report
        if: steps.code-test.outcome == 'success'
        run: |
          snyk code test \
            --report \
            --target-name="${{ env.TARGET_NAME }}" \
            --project-name="[code] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 – Container
  # Scans the image manifest + OS packages; monitor keeps a live snapshot.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-container:
    name: Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image             # skip if image already exists in a registry
        run: docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Stage 2: Test gate — runs first per the 3-stage adoption model.
      # Best practice: scan after docker build, before pushing to registry.
      # Set continue-on-error: false to hard-block the pipeline on findings.
      - name: Snyk Container Test
        id: container-test
        run: |
          snyk container test ${{ env.DOCKER_IMAGE }} \
            --file=Dockerfile \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline

      # Stage 3: Monitor — only runs when test passes so the Snyk UI snapshot
      # always represents a known-clean build state.
      # The target in Snyk UI is derived from the image name; use --project-name
      # to differentiate this project within the org.
      - name: Snyk Container Monitor
        if: steps.container-test.outcome == 'success'
        run: |
          snyk container monitor ${{ env.DOCKER_IMAGE }} \
            --project-name="[container] ${{ env.DOCKER_IMAGE }}" \
            --org="${{ vars.SNYK_ORG_ID }}" \
            --file=Dockerfile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 – Infrastructure as Code (IaC)
  # snyk iac test supports --report for uploading results to Snyk UI.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-iac:
    name: Infrastructure as Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk@${{ env.SNYK_CLI_VERSION }}

      - name: Authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # Report — uploads a snapshot to Snyk UI regardless of findings.
      # Stage 2: Test gate — runs first per the 3-stage adoption model.
      # Best practice: IaC runs after SCA and Container stages in the pipeline.
      # Pass a specific path (e.g. "./infra") or use "." to scan the entire repo.
      # Set continue-on-error: false to hard-block the pipeline on findings.
      - name: Snyk IaC Test
        id: iac-test
        run: |
          snyk iac test . \
            --severity-threshold=high \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true       # set to false to hard-block the pipeline

      # Stage 3: Report — uploads snapshot to Snyk UI only when test passes,
      # so the UI reflects known-clean build states.
      - name: Snyk IaC Report
        if: steps.iac-test.outcome == 'success'
        run: |
          snyk iac test . \
            --report \
            --target-name="${{ env.TARGET_NAME }}" \
            --project-name="[iac] ${{ github.repository }}" \
            --org="${{ vars.SNYK_ORG_ID }}"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 – Summary (runs after all scan jobs)
  # Handy for PR status checks — a single gate that reflects all scan results.
  # ──────────────────────────────────────────────────────────────────────────
  snyk-summary:
    name: Snyk Scan Summary
    runs-on: ubuntu-latest
    needs:
      - snyk-open-source
      - snyk-code
      - snyk-container
      - snyk-iac
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║         SNYK SCAN SUMMARY                ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Target   : ${{ env.TARGET_NAME }}"
          echo "║ Open Source : ${{ needs.snyk-open-source.result }}"
          echo "║ Code        : ${{ needs.snyk-code.result }}"
          echo "║ Container   : ${{ needs.snyk-container.result }}"
          echo "║ IaC         : ${{ needs.snyk-iac.result }}"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "View all results in Snyk UI under target: ${{ env.TARGET_NAME }}"

# Reference
# ─────────────────────────────────────────────────────────────────────────https://github.com/pdrakesnyk/pipelineScanConsolidation/blob/main/snyk-full-scan.yml
# Snyk UI grouping — CLI flag support by scan type:
#
#   Command                  --target-name  --project-name  --remote-repo-url
#   ──────────────────────── ─────────────  ──────────────  ─────────────────
#   snyk monitor             ✗              ✓               ✓ (sets target)
#   snyk code test --report  ✓              ✓               —
#   snyk container monitor   ✗              ✓               —
#   snyk iac test --report   ✓              ✓               ✓
#
# For snyk monitor: --remote-repo-url controls the target. The URL path
# (/org/repo) becomes the target display name in the Snyk UI.
#
# For snyk code test and snyk iac test: --target-name directly sets the
# target display name. Using github.repository is recommended for consistency.
#
# --project-name differentiates project cards within a target.
# Convention used here: "[type] repo" — easy to filter in the UI.
#
# Monorepos: swap --project-name for --project-name-prefix when using
# --all-projects, to avoid name collisions across multiple manifests:
#   --project-name-prefix="[sca]"
#
# snyk code test --report and snyk iac test --report require a Snyk Code
# or IaC+ plan. Without the right plan, omit --report; test output still
# prints to stdout and the CI gate still works.
#
# To use the official Snyk GitHub Actions instead of the CLI directly:
#   uses: snyk/actions/node@master   (adjust for your runtime)
# The same flags apply via the `args:` input.
#
##############################################################################
